---
- name: Install and Configure HashiCorp Vault
  hosts: vault_servers
  gather_facts: true

  tasks:
    - name: Install prerequisite packages
      apt:
        name:
          - gnupg
          - software-properties-common
          - curl
        state: present
        update_cache: true

    - name: Add HashiCorp GPG key
      apt_key:
        url: https://apt.releases.hashicorp.com/gpg
        state: present

    - name: Add HashiCorp APT repository
      apt_repository:
        repo: "deb [arch=amd64] https://apt.releases.hashicorp.com {{ ansible_distribution_release }} main"
        state: present

    - name: Install Vault
      apt:
        name: vault
        state: present
        update_cache: true

    - name: Create Vault configuration file
      copy:
        dest: /etc/vault.d/vault.hcl
        owner: vault
        group: vault
        mode: "0640"
        content: |
          # TODO: remove for prod
          ui = true

          storage "file" {
            path = "/opt/vault/data"
          }

          # Listen on all interfaces, port 8200
          listener "tcp" {
            address       = "0.0.0.0:8200"
            # TODO: Setup TLS for prod
            tls_disable   = 1
          }

          disable_mlock = true

    - name: Ensure Vault data directory exists
      file:
        path: /opt/vault/data
        state: directory
        owner: vault
        group: vault
        mode: "0750"

    - name: Enable and start Vault service
      systemd:
        name: vault
        enabled: true
        state: started
